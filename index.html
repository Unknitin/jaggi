<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Join the Channel</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #d4a843;
    --gold-light: #f5d07a;
    --green: #1aff72;
    --green-dim: #00c96a;
  }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #000;
  }

  /* ── BG ── */
  .bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: linear-gradient(
      to top,
      #000000 0%,
      #040e07 20%,
      #071a0d 40%,
      #0b2c15 60%,
      #10401e 78%,
      #175a2a 90%,
      #1d7035 100%
    );
  }

  /* ruled lines */
  .bg::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 30px,
      rgba(255,255,255,0.03) 30px,
      rgba(255,255,255,0.03) 31px
    );
  }

  /* subtle center glow */
  .bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 90% 60% at 50% 45%, rgba(0,200,80,0.05) 0%, transparent 70%);
  }

  /* ── CARD ── */
  .card {
    position: relative;
    z-index: 10;
    width: 88vw;
    max-width: 360px;
    text-align: center;
    padding: 44px 28px 48px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── SUITS ROW ── */
  .suits {
    display: flex;
    gap: 14px;
    margin-bottom: 24px;
    font-size: 22px;
    opacity: 0;
    animation: up 0.6s 0.1s ease forwards;
  }

  .suits span { display: inline-block; }
  .suits span:nth-child(2),
  .suits span:nth-child(4) { color: #e84060; }

  /* ── EYEBROW ── */
  .eyebrow {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.38em;
    text-transform: uppercase;
    color: var(--green-dim);
    margin-bottom: 14px;
    opacity: 0;
    animation: up 0.6s 0.2s ease forwards;
  }

  /* ── HEADLINE ── */
  h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(24px, 7.5vw, 32px);
    font-weight: 700;
    line-height: 1.2;
    color: #fff;
    margin-bottom: 4px;
    opacity: 0;
    animation: up 0.6s 0.3s ease forwards;
  }

  h1 .gold {
    background: linear-gradient(135deg, var(--gold-light), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    display: block;
  }

  /* ── DIVIDER ── */
  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    margin: 22px 0;
    opacity: 0;
    animation: up 0.6s 0.42s ease forwards;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(212,168,67,0.3), transparent);
  }

  .divider span { font-size: 14px; }

  /* ── SUBTEXT ── */
  .sub {
    font-size: 12px;
    font-weight: 300;
    line-height: 1.75;
    color: rgba(255,255,255,0.4);
    margin-bottom: 34px;
    opacity: 0;
    animation: up 0.6s 0.52s ease forwards;
  }

  .sub b {
    color: rgba(255,255,255,0.65);
    font-weight: 500;
  }

  /* ── CTA ── */
  .cta-wrap {
    position: relative;
    opacity: 0;
    animation: up 0.6s 0.65s ease forwards;
  }

  /* glow halo */
  .cta-wrap::before {
    content: '';
    position: absolute;
    inset: -10px;
    border-radius: 50px;
    background: radial-gradient(ellipse, rgba(26,255,114,0.12) 0%, transparent 70%);
    animation: pulse 2.8s ease-in-out infinite;
  }

  .cta {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 15px 36px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #fff;
    text-decoration: none;
    border-radius: 50px;
    border: 2px dashed rgba(26,255,114,0.5);
    background: rgba(26,255,114,0.05);
    transition: all 0.2s ease;
    animation: borderPulse 2.8s ease-in-out infinite;
  }

  .cta:active {
    transform: scale(0.96);
    background: rgba(26,255,114,0.12);
  }

  .cta .ico { font-size: 16px; }

  /* ── FOOTER ── */
  .foot {
    margin-top: 28px;
    font-size: 8px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.14);
    opacity: 0;
    animation: fadeIn 1s 1.1s ease forwards;
  }

  /* ── CORNERS ── */
  .c {
    position: fixed;
    z-index: 3;
    font-size: 16px;
    color: rgba(255,255,255,0.06);
    pointer-events: none;
  }
  .c.tl { top: 18px; left: 18px; }
  .c.tr { top: 18px; right: 18px; }
  .c.bl { bottom: 18px; left: 18px; }
  .c.br { bottom: 18px; right: 18px; }

  /* ── PARTICLES ── */
  .particles {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    overflow: hidden;
  }

  .p {
    position: absolute;
    opacity: 0;
    font-size: 12px;
    animation: drift linear infinite;
  }

  /* ── KEYFRAMES ── */
  @keyframes up {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn { to { opacity: 1; } }

  @keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50%       { opacity: 1; }
  }

  @keyframes borderPulse {
    0%, 100% { border-color: rgba(26,255,114,0.4); }
    50%       { border-color: rgba(26,255,114,0.85); }
  }

  @keyframes drift {
    0%   { opacity: 0; transform: translateY(100vh) rotate(0deg); }
    8%   { opacity: 0.5; }
    92%  { opacity: 0.2; }
    100% { opacity: 0; transform: translateY(-15vh) rotate(360deg); }
  }
</style>
</head>
<body>

<div class="bg"></div>

<!-- corners -->
<div class="c tl">♠</div>
<div class="c tr">♠</div>
<div class="c bl">♦</div>
<div class="c br">♦</div>

<!-- particles -->
<div class="particles" id="pts"></div>

<div class="card">

  <div class="suits">
    <span>♠</span><span>♥</span><span>♣</span><span>♦</span>
  </div>

  <p class="eyebrow">Exclusive Access</p>

  <h1>
    Play Smart.<br>
    <span class="gold">Win Big.</span>
  </h1>

  <div class="divider"><span>🎰</span></div>

  <p class="sub">
    <b>Daily tips, signals</b> &amp; real‑time plays.<br>
    Elite edge. Every day.
  </p>

  <div class="cta-wrap">
    <a class="cta" href="https://t.me/+X5zyyScfaoFmMzE9" target="_blank" rel="noopener">
      <span class="ico">✈️</span>
      Join on Telegram
    </a>
  </div>

  <p class="foot">18+ · Play Responsibly</p>

</div>

<script>
  const pool = ['♠','♥','♦','♣','🎲','💰','7️⃣','🃏'];
  const c = document.getElementById('pts');
  for (let i = 0; i < 10; i++) {
    const el = document.createElement('div');
    el.className = 'p';
    el.textContent = pool[Math.floor(Math.random() * pool.length)];
    el.style.left = Math.random() * 100 + 'vw';
    el.style.fontSize = (9 + Math.random() * 10) + 'px';
    el.style.animationDuration = (10 + Math.random() * 12) + 's';
    el.style.animationDelay = (Math.random() * 14) + 's';
    c.appendChild(el);
  }
</script>
</body>
</html>
